<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rukus Health &mdash; MyChart Connect</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 520px; margin: 60px auto; padding: 0 20px;
      background: #111; color: #ddd; line-height: 1.6;
    }
    h1 { color: #fff; font-size: 1.4em; margin-bottom: 4px; }
    .sub { color: #888; font-size: 0.9em; margin-bottom: 28px; }
    label { display: block; margin: 16px 0 6px; font-size: 0.85em; color: #aaa; }
    select, button, textarea {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      border-radius: 6px; border: 1px solid #333;
      background: #1a1a1a; color: #ddd; font: inherit;
    }
    select { margin-bottom: 20px; }
    button {
      background: #2563eb; color: #fff; border: none; cursor: pointer;
      font-weight: 500; margin-bottom: 24px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: default; }
    .result { display: none; }
    .result.show { display: block; }
    textarea {
      font-family: 'SF Mono', Monaco, monospace; font-size: 0.82em;
      height: 280px; margin: 10px 0 16px; resize: vertical;
    }
    .actions { display: flex; gap: 8px; }
    .actions button { flex: 1; }
    .secondary { background: #374151; }
    .secondary:hover { background: #4b5563; }
    .info { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 6px;
            padding: 10px 14px; font-size: 0.85em; color: #8c8; margin-bottom: 20px; }
    .warn { background: #2a1a1a; border: 1px solid #4a2a2a; color: #c88; }
  </style>
</head>
<body>
  <h1>Rukus Health</h1>
  <p class="sub">Connect MyChart to pull your labs automatically.</p>

  <label for="provider">MyChart Provider</label>
  <select id="provider">
    <option value="lexington">Lexington Medical Center (LMC MyChart)</option>
    <option value="prisma">Prisma Health (MyChart)</option>
  </select>

  <div class="info">
    This app never sees your password. You log in directly with MyChart. Only an
    access token you control is produced. Tokens are shown on screen and never
    sent anywhere except to Epic's own servers.
  </div>

  <button id="connectBtn" onclick="startAuth()">Connect to MyChart</button>

  <div id="result" class="result">
    <label for="output">Tokens &mdash; copy these to the CLI</label>
    <textarea id="output" readonly></textarea>
    <div class="actions">
      <button onclick="copyTokens()">Copy to Clipboard</button>
      <button class="secondary" onclick="downloadTokens()">Download JSON</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
