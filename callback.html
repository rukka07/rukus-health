<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rukus Health &mdash; Connecting...</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 520px; margin: 60px auto; padding: 0 20px;
      background: #111; color: #ddd; line-height: 1.6;
    }
    h1 { color: #fff; font-size: 1.4em; }
    .status { margin: 20px 0; color: #8c8; }
    .status.error { color: #c88; }
    textarea {
      width: 100%; box-sizing: border-box; padding: 10px 12px;
      border-radius: 6px; border: 1px solid #333;
      background: #1a1a1a; color: #ddd; font-family: 'SF Mono', Monaco, monospace;
      font-size: 0.82em; height: 280px; margin: 10px 0 16px; resize: vertical;
    }
    .actions { display: flex; gap: 8px; }
    .actions button { flex: 1; padding: 10px; border-radius: 6px; cursor: pointer;
      font: inherit; font-weight: 500; border: none; }
    .actions button:first-child { background: #2563eb; color: #fff; }
    .actions button:first-child:hover { background: #1d4ed8; }
    .actions button:last-child { background: #374151; color: #ddd; }
    .actions button:last-child:hover { background: #4b5563; }
    .info { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 6px;
            padding: 10px 14px; font-size: 0.85em; color: #8c8; margin: 20px 0; }
    .warn { background: #2a1a1a; border: 1px solid #4a2a2a; color: #c88; }
  </style>
</head>
<body>
  <h1>Rukus Health</h1>
  <div id="status" class="status">Exchanging authorization code for tokens...</div>
  <div id="result" style="display:none;">
    <div class="info">
      Save these tokens securely. The <code>epic_fhir_pull.py pull</code> command
      uses the refresh token to pull labs automatically. Paste the JSON below into
      <code>secrets/epic_tokens.json</code> on your VM.
    </div>
    <textarea id="output" readonly></textarea>
    <div class="actions">
      <button onclick="copyTokens()">Copy to Clipboard</button>
      <button onclick="downloadTokens()">Download JSON</button>
    </div>
  </div>
  <script src="callback.js"></script>
</body>
</html>
